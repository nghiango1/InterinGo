name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optional: Login to Docker Hub (requires secrets)
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | podman login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: interingo-service
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build Docker image
        run: podman build -f docker/service.Dockerfile . -t docker.io/nghiango1/interingo-service:latest .

      # Optional: Push image to Docker Hub
      - name: Push Docker image
        run: podman push docker.io/nghiango1/interingo-service:latest
