name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Optional: Login to Docker Hub (requires secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: interingo-service
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build Docker image
        run: docker build -f docker/service.Dockerfile . -t docker.io/nghiango1/interingo-service:latest .

      # Optional: Push image to Docker Hub
      - name: Push Docker image
        run: docker push docker.io/nghiango1/interingo-service:latest
